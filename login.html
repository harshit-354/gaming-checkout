<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TidyBit | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="login">
  <main class="auth-page">
    <section class="auth-shell wrapper">
      <div class="auth-copy">
        <a href="index.html" class="back-link">← Back to TidyBit</a>
        <p class="eyebrow">Welcome back</p>
        <h1>Log in to save your gaming decisions.</h1>
        <p>Keep your account ready for reviews, comments, and future wishlist ideas.</p>
      </div>
      <form id="loginForm" class="auth-form card-surface">
        <label>
          <span>Username or Email</span>
          <input type="text" name="usernameOrEmail" placeholder="Enter your username or email" required />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter your password" required />
        </label>
        <button type="submit" class="primary-btn full-width">Login</button>
        <p class="form-feedback" id="loginFeedback"></p>
        <p class="mini-text">Need an account? <a href="registration.html">Create one</a></p>
      </form>
    </section>
  </main>
  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
