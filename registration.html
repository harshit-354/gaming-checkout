<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TidyBit | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="register">
  <main class="auth-page">
    <section class="auth-shell wrapper">
      <div class="auth-copy">
        <a href="index.html" class="back-link">← Back to TidyBit</a>
        <p class="eyebrow">Join the platform</p>
        <h1>Create your account and personalize your game choices.</h1>
        <p>Register to leave comments, test new tools, and keep the project feeling like a real platform.</p>
      </div>
      <form id="registerForm" class="auth-form card-surface">
        <label>
          <span>Username</span>
          <input type="text" name="username" placeholder="Choose a username" required />
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="Enter your email" required />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Create a password" required minlength="6" />
        </label>
        <button type="submit" class="primary-btn full-width">Create account</button>
        <p class="form-feedback" id="registerFeedback"></p>
        <p class="mini-text">Already have an account? <a href="login.html">Login here</a></p>
      </form>
    </section>
  </main>
  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
