<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>PlayWise | Hardware Admin</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='style.css' />
</head>
<body data-page='hardware-admin'>
  <header class='site-header'>
    <div class='wrapper nav-shell'>
      <a class='brand' href='index.html'>
        <span class='brand-mark'>PW</span>
        <span>
          <strong>PlayWise</strong>
          <small>hardware admin</small>
        </span>
      </a>
      <nav class='site-nav is-open' id='siteNav'>
        <a href='index.html'>Home</a>
        <a href='open-source.html'>Open-source</a>
        <a href='hardware-admin.html' class='primary-btn'>Hardware Admin</a>
      </nav>
    </div>
  </header>

  <main class='wrapper' style='padding-top:2rem; padding-bottom:4rem;'>
    <section class='panel'>
      <div class='panel-head'>
        <div>
          <p class='eyebrow'>Backend hardware catalog</p>
          <h1>Manage CPUs, GPUs and laptop presets</h1>
          <p class='panel-text'>This page is just a small admin panel so you can add hardware later without going back and editing code files every time.</p>
        </div>
      </div>

      <div class='admin-grid'>
        <article class='card-surface admin-card'>
          <h2>Add CPU</h2>
          <form id='cpuAdminForm' class='admin-form'>
            <label><span>Name</span><input name='name' required placeholder='Intel Core i7-14700HX' /></label>
            <label><span>Score</span><input name='score' type='number' required placeholder='110' /></label>
            <label><span>Family</span><input name='family' placeholder='Laptop / Desktop / Apple Silicon' /></label>
            <label><span>Platform</span><input name='platform' placeholder='windows or macos' /></label>
            <button class='primary-btn' type='submit'>Save CPU</button>
            <p class='form-feedback'></p>
          </form>
          <ul id='adminCpuList' class='hardware-admin-list'></ul>
        </article>

        <article class='card-surface admin-card'>
          <h2>Add GPU</h2>
          <form id='gpuAdminForm' class='admin-form'>
            <label><span>Name</span><input name='name' required placeholder='NVIDIA RTX 5070' /></label>
            <label><span>Score</span><input name='score' type='number' required placeholder='120' /></label>
            <label><span>Family</span><input name='family' placeholder='Dedicated / Integrated' /></label>
            <label><span>Platform</span><input name='platform' placeholder='windows or macos' /></label>
            <button class='primary-btn' type='submit'>Save GPU</button>
            <p class='form-feedback'></p>
          </form>
          <ul id='adminGpuList' class='hardware-admin-list'></ul>
        </article>

        <article class='card-surface admin-card'>
          <h2>Add Laptop preset</h2>
          <form id='laptopAdminForm' class='admin-form'>
            <label><span>Model</span><input name='model' required placeholder='Lenovo Legion 7 RTX 5070 32GB' /></label>
            <label><span>Brand</span><input name='brand' required placeholder='Lenovo' /></label>
            <label><span>CPU</span><input name='cpu' required placeholder='Intel Core i7-14700HX' /></label>
            <label><span>GPU</span><input name='gpu' required placeholder='NVIDIA RTX 5070' /></label>
            <label><span>RAM</span><input name='ram' type='number' required placeholder='32' /></label>
            <label><span>Platform</span><input name='platform' placeholder='windows or macos' /></label>
            <label><span>Tags</span><input name='tags' placeholder='gaming, creator' /></label>
            <button class='primary-btn' type='submit'>Save laptop preset</button>
            <p class='form-feedback'></p>
          </form>
          <ul id='adminLaptopList' class='hardware-admin-list'></ul>
        </article>
      </div>
    </section>
  </main>

  <script src='main.js'></script>
</body>
</html>
